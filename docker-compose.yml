services:
  icbf-informes:
    build: .
    container_name: icbf-informes
    restart: unless-stopped
    ports:
      - "8001:8000"
    environment:
      - TZ=America/Bogota
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
