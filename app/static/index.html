<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICBF · Generador de Informes</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg:       #0f1117;
    --surface:  #181c27;
    --border:   #252a38;
    --accent:   #3b82f6;
    --accent2:  #22d3ee;
    --warn:     #f59e0b;
    --danger:   #ef4444;
    --success:  #10b981;
    --text:     #e2e8f0;
    --muted:    #64748b;
    --mono:     'IBM Plex Mono', monospace;
    --sans:     'IBM Plex Sans', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    border-bottom: 1px solid var(--border);
    padding: 18px 32px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .logo-mark {
    width: 32px; height: 32px;
    background: var(--accent);
    border-radius: 6px;
    display: grid; place-items: center;
    font-family: var(--mono);
    font-weight: 600;
    font-size: 13px;
    color: #fff;
    flex-shrink: 0;
  }
  header h1 { font-size: 15px; font-weight: 500; letter-spacing: .02em; }
  header span { color: var(--muted); font-size: 13px; margin-left: 8px; }

  /* ── Layout ── */
  main {
    flex: 1;
    max-width: 860px;
    width: 100%;
    margin: 0 auto;
    padding: 40px 24px 60px;
    display: flex;
    flex-direction: column;
    gap: 28px;
  }

  /* ── Mode selector ── */
  .mode-tabs {
    display: grid;
    grid-template-columns: 1fr 1fr;
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .mode-tab {
    padding: 20px 24px;
    cursor: pointer;
    background: var(--surface);
    border: none;
    color: var(--muted);
    text-align: left;
    transition: background .15s, color .15s;
    position: relative;
  }
  .mode-tab + .mode-tab { border-left: 1px solid var(--border); }
  .mode-tab.active {
    background: #1a2236;
    color: var(--text);
  }
  .mode-tab.active::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent);
  }
  .mode-tab-title {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .mode-tab-desc { font-size: 12px; line-height: 1.5; }
  .badge {
    font-family: var(--mono);
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 4px;
    background: #1e3a5f;
    color: var(--accent2);
    font-weight: 600;
    letter-spacing: .04em;
  }
  .badge.plus { background: #1a3828; color: var(--success); }

  /* ── Card ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 24px;
  }
  .card-title {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
  }

  /* ── File inputs ── */
  .file-grid {
    display: grid;
    gap: 12px;
  }
  .file-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    transition: border-color .15s;
    position: relative;
  }
  .file-row:hover { border-color: var(--accent); }
  .file-row.has-file { border-color: #1d4a2e; background: #0f1f18; }
  .file-row input[type="file"] {
    position: absolute; inset: 0;
    opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }
  .file-icon {
    width: 34px; height: 34px;
    border-radius: 6px;
    background: #1a2236;
    display: grid; place-items: center;
    flex-shrink: 0;
    font-size: 16px;
  }
  .file-row.has-file .file-icon { background: #1a3828; }
  .file-info { flex: 1; min-width: 0; }
  .file-label { font-size: 13px; font-weight: 500; }
  .file-name {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--success);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-top: 2px;
  }
  .file-placeholder { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .file-optional {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 6px;
    flex-shrink: 0;
  }

  /* ── Optional file section ── */
  #activos-row { display: none; }
  #activos-row.visible { display: flex; }

  /* ── Button ── */
  .btn-run {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: #fff;
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 600;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: background .15s, opacity .15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-run:hover { background: #2563eb; }
  .btn-run:disabled { opacity: .5; cursor: not-allowed; }

  /* ── Progress / Status ── */
  #status-area { display: none; }
  #status-area.visible { display: block; }

  .progress-bar-wrap {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 16px;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    width: 0%;
    transition: width .4s ease;
  }
  .progress-bar.indeterminate {
    width: 40%;
    animation: slide 1.2s ease-in-out infinite;
  }
  @keyframes slide {
    0%   { transform: translateX(-100%); }
    100% { transform: translateX(350%); }
  }

  .status-msg {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 12px;
  }

  /* ── Results ── */
  #results-area { display: none; }
  #results-area.visible { display: block; }

  .results-grid {
    display: grid;
    gap: 8px;
    margin-bottom: 16px;
  }
  .result-row {
    display: grid;
    grid-template-columns: auto 1fr auto auto auto;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
  }
  .result-tipo {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 4px;
    background: #1e3a5f;
    color: var(--accent2);
  }
  .result-tipo.gestante { background: #2d1f4a; color: #a78bfa; }
  .result-contrato { font-family: var(--mono); font-size: 12px; }
  .result-stat {
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
  }
  .result-stat strong { color: var(--text); font-weight: 600; }
  .result-stat.warn strong { color: var(--warn); }
  .result-stat.danger strong { color: var(--danger); }

  .btn-download-all {
    width: 100%;
    padding: 12px;
    background: #1a3828;
    color: var(--success);
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 600;
    border: 1px solid #1d4a2e;
    border-radius: 8px;
    cursor: pointer;
    transition: background .15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-download-all:hover { background: #1e4a30; }

  /* ── Error ── */
  .error-box {
    padding: 14px 16px;
    background: #1f1215;
    border: 1px solid #3d1a1a;
    border-radius: 8px;
    color: #fca5a5;
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.6;
    display: none;
  }
  .error-box.visible { display: block; }
</style>
</head>
<body>

<header>
  <div class="logo-mark">IC</div>
  <h1>Generador de Informes ICBF</h1>
  <span>Nutrición · Tomas · Alertas</span>
</header>

<main>

  <!-- Selector de modo -->
  <div class="mode-tabs">
    <button class="mode-tab active" id="tab-basico" onclick="setModo('basico')">
      <div class="mode-tab-title">
        Modo Básico
        <span class="badge">2 archivos</span>
      </div>
      <div class="mode-tab-desc">
        Analiza el historial de tomas registradas.<br>
        Requiere General + Gestante.
      </div>
    </button>
    <button class="mode-tab" id="tab-completo" onclick="setModo('completo')">
      <div class="mode-tab-title">
        Modo Completo
        <span class="badge plus">3 archivos</span>
      </div>
      <div class="mode-tab-desc">
        Cruza con el padrón de activos para detectar beneficiarios sin ninguna toma registrada.
      </div>
    </button>
  </div>

  <!-- Archivos -->
  <div class="card">
    <div class="card-title">Archivos de entrada</div>
    <div class="file-grid">

      <label class="file-row" id="row-general">
        <input type="file" id="file-general" accept=".xlsx,.xls,.csv" onchange="onFile(this,'general')">
        <div class="file-icon">📊</div>
        <div class="file-info">
          <div class="file-label">ICBFCUEGeneralPorToma</div>
          <div class="file-placeholder" id="ph-general">Haz clic o arrastra el archivo</div>
          <div class="file-name" id="fn-general"></div>
        </div>
      </label>

      <label class="file-row" id="row-gestante">
        <input type="file" id="file-gestante" accept=".xlsx,.xls,.csv" onchange="onFile(this,'gestante')">
        <div class="file-icon">📋</div>
        <div class="file-info">
          <div class="file-label">GestanteLactantePorToma</div>
          <div class="file-placeholder" id="ph-gestante">Haz clic o arrastra el archivo</div>
          <div class="file-name" id="fn-gestante"></div>
        </div>
      </label>

      <label class="file-row" id="activos-row">
        <input type="file" id="file-activos" accept=".xlsx,.xls,.csv" onchange="onFile(this,'activos')">
        <div class="file-icon">👥</div>
        <div class="file-info">
          <div class="file-label">ICBFCUEBeneficiariosPIActivosRegionalizado</div>
          <div class="file-placeholder" id="ph-activos">Haz clic o arrastra el archivo</div>
          <div class="file-name" id="fn-activos"></div>
        </div>
        <span class="file-optional">REQUERIDO</span>
      </label>

    </div>
  </div>

  <!-- Botón -->
  <button class="btn-run" id="btn-run" onclick="ejecutar()" disabled>
    <span id="btn-icon">⚡</span>
    <span id="btn-text">Generar informes</span>
  </button>

  <!-- Error -->
  <div class="error-box" id="error-box"></div>

  <!-- Progreso -->
  <div id="status-area">
    <div class="progress-bar-wrap">
      <div class="progress-bar indeterminate" id="pbar"></div>
    </div>
    <div class="status-msg" id="status-msg">Procesando archivos…</div>
  </div>

  <!-- Resultados -->
  <div id="results-area">
    <div class="card">
      <div class="card-title">Informes generados</div>
      <div class="results-grid" id="results-grid"></div>
      <button class="btn-download-all" id="btn-dl">
        ↓ &nbsp;Descargar todos los informes (.zip)
      </button>
    </div>
  </div>

</main>

<script>
  let modo = 'basico';
  let zipBlob = null;

  function setModo(m) {
    modo = m;
    document.getElementById('tab-basico').classList.toggle('active', m === 'basico');
    document.getElementById('tab-completo').classList.toggle('active', m === 'completo');
    const ar = document.getElementById('activos-row');
    if (m === 'completo') ar.classList.add('visible');
    else ar.classList.remove('visible');
    validar();
  }

  function onFile(input, key) {
    const row = document.getElementById('row-' + key) || document.getElementById('activos-row');
    const ph  = document.getElementById('ph-' + key);
    const fn  = document.getElementById('fn-' + key);
    if (input.files[0]) {
      const target = key === 'activos'
        ? document.getElementById('activos-row')
        : document.getElementById('row-' + key);
      target.classList.add('has-file');
      ph.style.display = 'none';
      fn.textContent = input.files[0].name;
    }
    validar();
  }

  function validar() {
    const g = document.getElementById('file-general').files[0];
    const ge = document.getElementById('file-gestante').files[0];
    const ac = document.getElementById('file-activos').files[0];
    const ok = g && ge && (modo === 'basico' || ac);
    document.getElementById('btn-run').disabled = !ok;
  }

  async function ejecutar() {
    setError('');
    setStatus(true, 'Enviando archivos…');
    setResults(false);
    document.getElementById('btn-run').disabled = true;
    document.getElementById('btn-text').textContent = 'Procesando…';
    document.getElementById('btn-icon').textContent = '⏳';

    const fd = new FormData();
    fd.append('modo', modo);
    fd.append('general',  document.getElementById('file-general').files[0]);
    fd.append('gestante', document.getElementById('file-gestante').files[0]);
    const ac = document.getElementById('file-activos').files[0];
    if (ac) fd.append('activos', ac);

    try {
      const res = await fetch('/procesar', { method: 'POST', body: fd });
      if (!res.ok) {
        const err = await res.json().catch(() => ({ detail: res.statusText }));
        throw new Error(err.detail || res.statusText);
      }

      const resumenRaw = res.headers.get('X-Resumen');
      const resumen = resumenRaw ? JSON.parse(resumenRaw) : [];
      zipBlob = await res.blob();

      renderResultados(resumen);
      setStatus(false);
      setResults(true);
    } catch (e) {
      setError(e.message);
      setStatus(false);
    } finally {
      document.getElementById('btn-run').disabled = false;
      document.getElementById('btn-text').textContent = 'Generar informes';
      document.getElementById('btn-icon').textContent = '⚡';
      validar();
    }
  }

  function renderResultados(resumen) {
    const grid = document.getElementById('results-grid');
    grid.innerHTML = '';
    resumen.forEach(r => {
      const row = document.createElement('div');
      row.className = 'result-row';
      const tipoLabel = r.tipo === 'general' ? 'GENERAL' : 'GESTANTE';
      const tipoClass = r.tipo === 'gestante' ? 'gestante' : '';
      row.innerHTML = `
        <span class="result-tipo ${tipoClass}">${tipoLabel}</span>
        <span class="result-contrato">${r.contrato}</span>
        <span class="result-stat">${r.n_vinculados} <strong>vinculados</strong></span>
        <span class="result-stat warn"><strong>${r.n_faltantes}</strong> tomas faltantes</span>
        <span class="result-stat danger"><strong>${r.n_alertas}</strong> alertas</span>
      `;
      grid.appendChild(row);
    });

    document.getElementById('btn-dl').onclick = () => {
      const url = URL.createObjectURL(zipBlob);
      const a = document.createElement('a');
      a.href = url; a.download = 'informes_icbf.zip';
      a.click();
      URL.revokeObjectURL(url);
    };
  }

  function setStatus(visible, msg) {
    const el = document.getElementById('status-area');
    el.classList.toggle('visible', visible);
    if (msg) document.getElementById('status-msg').textContent = msg;
  }

  function setResults(visible) {
    document.getElementById('results-area').classList.toggle('visible', visible);
  }

  function setError(msg) {
    const el = document.getElementById('error-box');
    el.classList.toggle('visible', !!msg);
    el.textContent = msg;
  }
</script>
</body>
</html>
